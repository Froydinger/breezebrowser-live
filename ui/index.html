<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Breeze</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="edge-handle" title="Show sidebar (⌘S)"></div>

  <div id="sidebar">
    <div id="drag-strip"><img src="icon.png" alt="" draggable="false" /></div>

    <div id="nav-row">
      <button class="nav-btn" id="btn-sidebar" title="Hide sidebar (⌘S)">
        <svg viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="10" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M6.5 3v10" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <span class="nav-spacer"></span>
      <button class="nav-btn" id="btn-back" title="Back (⌘[)">
        <svg viewBox="0 0 16 16"><path d="M10 3 5 8l5 5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="nav-btn" id="btn-forward" title="Forward (⌘])">
        <svg viewBox="0 0 16 16"><path d="m6 3 5 5-5 5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="nav-btn" id="btn-reload" title="Reload (⌘R)">
        <svg viewBox="0 0 16 16"><path d="M13 8a5 5 0 1 1-1.5-3.6M13 2.5V5h-2.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div id="address-wrap">
      <svg id="address-icon" viewBox="0 0 16 16"><circle cx="7" cy="7" r="4.5" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="m10.5 10.5 3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <input id="address" type="text" placeholder="Search or enter URL" spellcheck="false" autocomplete="off" />
      <button id="btn-bookmark" title="Bookmark this page (⌘D)">
        <svg viewBox="0 0 16 16"><path d="M4 2.5h8a.5.5 0 0 1 .5.5v10.6a.3.3 0 0 1-.48.24L8 11l-4.02 2.84a.3.3 0 0 1-.48-.24V3a.5.5 0 0 1 .5-.5z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
      </button>
      <div id="suggestions"></div>
    </div>

    <div id="pins"></div>

    <div id="tabs"></div>

    <button id="new-tab-btn">
      <svg viewBox="0 0 16 16"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>New Tab</span>
      <kbd>⌘T</kbd>
    </button>

    <div id="sidebar-footer">
      <div id="adblock-pill" title="Ads & trackers blocked this session">
        <svg viewBox="0 0 16 16"><path d="M8 1.5 13.5 4v4c0 3.2-2.3 5.7-5.5 6.5C4.8 13.7 2.5 11.2 2.5 8V4L8 1.5z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        <span id="adblock-count">0</span>
      </div>
      <div class="footer-btns">
        <button class="nav-btn" id="bookmarks-btn" title="Bookmarks (⌥⌘B)">
          <svg viewBox="0 0 16 16"><path d="M4 2.5h8a.5.5 0 0 1 .5.5v10.6a.3.3 0 0 1-.48.24L8 11l-4.02 2.84a.3.3 0 0 1-.48-.24V3a.5.5 0 0 1 .5-.5z" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
        </button>
        <button class="nav-btn" id="downloads-btn" title="Downloads (⇧⌘J)">
          <svg viewBox="0 0 16 16"><path d="M8 2v8M4.5 6.5 8 10l3.5-3.5M3 13h10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span id="dl-dot"></span>
        </button>
        <button class="nav-btn" id="history-btn" title="History (⌘Y)">
          <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M8 4.5V8l2.5 1.5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="nav-btn" id="ai-btn" title="Assistant (⌘E)">
          <svg viewBox="0 0 16 16"><path d="M8 1.8l1.4 3.6a1 1 0 0 0 .58.58L13.6 7.4a.65.65 0 0 1 0 1.2l-3.62 1.42a1 1 0 0 0-.58.58L8 14.2a.65.65 0 0 1-1.2 0L5.4 10.6a1 1 0 0 0-.58-.58L1.2 8.6a.65.65 0 0 1 0-1.2l3.62-1.42a1 1 0 0 0 .58-.58L6.8 1.8a.65.65 0 0 1 1.2 0z" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
        </button>
        <button class="nav-btn" id="settings-btn" title="Settings (⌘,)">
          <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="2.2" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M8 1.6v2M8 12.4v2M1.6 8h2M12.4 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M12.5 3.5l-1.4 1.4M4.9 11.1l-1.4 1.4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
        <button class="nav-btn" id="theme-btn" title="Toggle dark mode (⇧⌘D)">
          <svg id="icon-sun" viewBox="0 0 16 16"><circle cx="8" cy="8" r="3.2" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 1.2v1.6M8 13.2v1.6M1.2 8h1.6M13.2 8h1.6M3.2 3.2l1.1 1.1M11.7 11.7l1.1 1.1M12.8 3.2l-1.1 1.1M4.3 11.7l-1.1 1.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <svg id="icon-moon" viewBox="0 0 16 16" style="display:none"><path d="M13.5 9.5A5.8 5.8 0 0 1 6.5 2.5 5.8 5.8 0 1 0 13.5 9.5z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>

    <div id="sidebar-resizer" title="Drag to resize"></div>
  </div>

  <div id="assistant">
    <div class="ai-header">
      <span class="ai-title">
        <svg viewBox="0 0 16 16"><path d="M8 1.8l1.4 3.6a1 1 0 0 0 .58.58L13.6 7.4a.65.65 0 0 1 0 1.2l-3.62 1.42a1 1 0 0 0-.58.58L8 14.2a.65.65 0 0 1-1.2 0L5.4 10.6a1 1 0 0 0-.58-.58L1.2 8.6a.65.65 0 0 1 0-1.2l3.62-1.42a1 1 0 0 0 .58-.58L6.8 1.8a.65.65 0 0 1 1.2 0z" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
        Assistant
      </span>
      <span class="ai-header-btns">
        <button class="nav-btn" id="ai-new-chat" title="New chat">
          <svg viewBox="0 0 16 16"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
        <button class="nav-btn" id="ai-close" title="Close (⌘E)">
          <svg viewBox="0 0 16 16"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
      </span>
    </div>

    <div id="ai-messages">
      <div id="ai-empty">
        <img class="ai-empty-logo" src="icon.png" alt="" draggable="false" />
        <h3>Private intelligence</h3>
        <p>Runs entirely on your Mac.<br/>Nothing ever leaves this device.</p>
        <div class="ai-chips">
          <button class="ai-chip">Summarize this page</button>
          <button class="ai-chip">Key takeaways</button>
          <button class="ai-chip">Explain this simply</button>
        </div>
      </div>
    </div>

    <div id="ai-statusbar"></div>

    <div id="ai-progress"><div id="ai-progress-fill"></div></div>

    <div class="ai-input-row">
      <label id="ai-ctx-toggle" title="Send the current page's content along with your question">
        <input type="checkbox" id="ai-include-page" checked />
        <span>Page context</span>
      </label>
      <div id="ai-input-wrap">
        <textarea id="ai-input" rows="1" placeholder="Ask about this page…"></textarea>
        <button id="ai-send" title="Send">
          <svg viewBox="0 0 16 16"><path d="M8 13V3M3.5 7.5 8 3l4.5 4.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div id="update-toast">
    <span>Update ready</span>
    <button id="update-btn">Restart</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
