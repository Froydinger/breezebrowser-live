<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>What's New — Breeze</title>
  <script>
    // Apply theme before first paint (no flash), like the new-tab page.
    try {
      var t = window.breezeInternal && breezeInternal.theme;
      var dark = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) document.documentElement.classList.add('dark');
    } catch (e) {}
  </script>
  <style>
    :root {
      --bg: #f9f7f4; --bg-alt: #ffffff; --card: rgba(255,255,255,0.88); --text: #202026;
      --soft: rgba(32,32,38,0.72); --faint: rgba(32,32,38,0.42); --accent: #3aa6b9;
      --accent-strong: #25879a; --line: rgba(0,0,0,0.09); --shadow: 0 22px 70px rgba(24,34,38,0.12);
      --ease: cubic-bezier(0.22,1,0.36,1);
    }
    html.dark {
      --bg: #151618; --bg-alt: #1c1d21; --card: rgba(255,255,255,0.07); --text: #ececf0;
      --soft: rgba(236,236,240,0.62); --faint: rgba(236,236,240,0.34); --line: rgba(255,255,255,0.1);
      --shadow: 0 22px 70px rgba(0,0,0,0.28);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background:
        radial-gradient(circle at 84% 6%, color-mix(in srgb, var(--accent) 14%, transparent), transparent 34rem),
        linear-gradient(180deg, var(--bg-alt) 0%, var(--bg) 38%, var(--bg-alt) 100%);
      color: var(--text); min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 54px 24px 86px; transition: background 0.3s var(--ease);
      -webkit-font-smoothing: antialiased;
    }
    .wrap { width: min(880px, 100%); margin: 0 auto; }
    header { position: relative; margin-bottom: 42px; animation: rise 0.56s var(--ease); }
    header::before {
      content: ''; position: absolute; width: 180px; height: 180px; right: 4%; top: -20px;
      border-radius: 50%; background: radial-gradient(circle, color-mix(in srgb, var(--accent) 18%, transparent), transparent 68%);
      transform: scale(0.7); opacity: 0; animation: bloom 0.8s var(--ease) 0.15s forwards, halo-drift 9s ease-in-out 1s infinite alternate; pointer-events: none;
    }
    header img { width: 46px; height: 46px; border-radius: 50%;
      filter: drop-shadow(0 10px 24px color-mix(in srgb, var(--accent) 35%, transparent)); margin-bottom: 24px;
      animation: mark-pop 0.62s var(--ease) 0.08s backwards, mark-float 5.6s ease-in-out 1s infinite; }
    header h1 {
      max-width: 720px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(46px, 8vw, 76px);
      font-weight: 400;
      line-height: 0.98;
      letter-spacing: 0;
    }
    header p { color: var(--soft); font-size: 17px; line-height: 1.65; max-width: 680px; margin-top: 18px; }
    .now { display: inline-flex; align-items: center; gap: 8px; margin-top: 22px; font-size: 12px; font-weight: 800;
      letter-spacing: 0.09em; text-transform: uppercase;
      color: var(--accent); background: color-mix(in srgb, var(--accent) 11%, transparent);
      padding: 7px 12px; border-radius: 99px; }
    .now::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
    .rel {
      position: relative; display: grid; grid-template-columns: 116px 1fr; gap: 28px;
      padding: 30px 0; border-top: 1px solid var(--line); animation: rise 0.5s var(--ease) backwards;
    }
    .rel:nth-of-type(2) { animation-delay: 0.04s; }
    .rel:nth-of-type(3) { animation-delay: 0.08s; }
    .rel::before { content: none; }
    .ver { display: flex; flex-direction: column; align-items: flex-start; gap: 9px; color: var(--accent); }
    .ver b { font-size: 13px; font-weight: 800; letter-spacing: 0.02em; }
    .ver .tag { font-size: 10px; font-weight: 800; color: var(--accent); background: color-mix(in srgb, var(--accent) 14%, transparent);
      padding: 3px 8px; border-radius: 99px; letter-spacing: 0.08em; text-transform: uppercase; }
    .rel h3 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(24px, 4.4vw, 36px);
      font-weight: 400; line-height: 1.12; letter-spacing: 0; margin-bottom: 14px;
    }
    ul { list-style: none; display: flex; flex-direction: column; gap: 9px; }
    li { font-size: 14.5px; line-height: 1.58; color: var(--soft); padding-left: 18px; position: relative; }
    li::before { content: ''; position: absolute; left: 1px; top: 0.75em; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
    li b { color: var(--text); font-weight: 600; }
    @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    @keyframes bloom { to { opacity: 1; transform: scale(1); } }
    @keyframes mark-pop { from { opacity: 0; transform: translateY(8px) scale(0.82) rotate(-8deg); } to { opacity: 1; transform: none; } }
    @keyframes mark-float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-5px) rotate(2deg); } }
    @keyframes halo-drift { from { transform: translate(0,0) scale(1); } to { transform: translate(-22px,18px) scale(1.08); } }

    /* Hero card for the newest release */
    .hero {
      position: relative; overflow: hidden;
      border-radius: 18px; padding: 28px 30px 30px; margin-bottom: 48px;
      color: var(--text); background: var(--card); border: 1px solid var(--line);
      box-shadow: var(--shadow);
      animation: hero-pop 0.6s var(--ease) 0.06s backwards, hero-breathe 8s ease-in-out 1.2s infinite;
    }
    @keyframes hero-pop { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: none; } }
    @keyframes hero-breathe { 0%, 100% { box-shadow: var(--shadow); } 50% { box-shadow: 0 28px 84px color-mix(in srgb, var(--accent) 18%, transparent); } }
    .hero::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(105deg, transparent 34%, rgba(255,255,255,0.34) 50%, transparent 66%);
      transform: translateX(-120%); animation: hero-shine 6.5s var(--ease) 0.4s infinite;
    }
    @keyframes hero-shine { 0%, 58% { transform: translateX(-120%); } 82%, 100% { transform: translateX(120%); } }
    .hero-orb { position: absolute; border-radius: 50%; pointer-events: none; z-index: 0; opacity: 0; animation: orb-in 0.9s var(--ease) 0.18s forwards, orb-drift 7s ease-in-out 1s infinite alternate; }
    .hero-orb.o1 { width: 210px; height: 210px; top: -96px; right: -68px; background: radial-gradient(circle, color-mix(in srgb, var(--accent) 25%, transparent), transparent 68%); }
    .hero-orb.o2 { width: 130px; height: 130px; bottom: -58px; left: -30px; background: radial-gradient(circle, color-mix(in srgb, #ffffff 90%, var(--accent)), transparent 70%); animation-direction: alternate-reverse; }
    @keyframes orb-in { from { opacity: 0; transform: scale(0.74); } to { opacity: 1; transform: scale(1); } }
    @keyframes orb-drift { from { translate: 0 0; } to { translate: -18px 14px; } }
    /* content sits above the orbs — scoped so the orbs stay absolutely placed */
    .hero-icon, .hero-pill, .hero-title, .hero-list { position: relative; z-index: 1; }
    .hero-icon {
      width: 58px; height: 58px; border-radius: 16px; margin-bottom: 18px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      box-shadow: 0 16px 34px color-mix(in srgb, var(--accent) 26%, transparent);
      animation: icon-pop 0.7s var(--ease) 0.15s backwards, icon-bob 4.2s ease-in-out 1.1s infinite;
    }
    .hero-icon svg { width: 33px; height: 33px; stroke: #fff; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    @keyframes icon-pop { 0% { opacity: 0; transform: scale(0.4) rotate(-12deg); } 60% { transform: scale(1.12) rotate(5deg); } 100% { opacity: 1; transform: none; } }
    @keyframes icon-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .hero-pill {
      display: inline-block; font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent); background: color-mix(in srgb, var(--accent) 12%, transparent);
      padding: 6px 12px; border-radius: 99px; margin-bottom: 14px;
    }
    .hero-title {
      max-width: 640px; font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(30px, 5.2vw, 46px); line-height: 1.04; font-weight: 400; letter-spacing: 0; margin-bottom: 18px;
    }
    .hero-list { display: flex; flex-direction: column; gap: 10px; }
    .hero-list li { font-size: 14.5px; line-height: 1.58; color: var(--soft); padding-left: 18px; position: relative; }
    .hero-list li::before { content: ''; position: absolute; left: 1px; top: 0.75em; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
    .hero-list li b { color: var(--text); font-weight: 700; }
    /* small icon chip on each past release */
    .rel-icon { display: inline-grid; place-items: center; width: 28px; height: 28px; border-radius: 9px;
      background: color-mix(in srgb, var(--accent) 12%, transparent); flex-shrink: 0; }
    .rel-icon svg { width: 13px; height: 13px; stroke: var(--accent); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .past-head { font-size: 12px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent); margin: 0 0 12px 2px; }
    .older-releases { margin-top: 10px; border-top: 1px solid var(--line); padding-top: 20px; }
    .older-releases summary {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      cursor: pointer; list-style: none; padding: 14px 18px; border-radius: 999px;
      background: var(--card); border: 1px solid var(--line); color: var(--text);
      font-size: 14px; font-weight: 750; margin-bottom: 24px; box-shadow: var(--shadow);
    }
    .older-releases summary::-webkit-details-marker { display: none; }
    .older-releases summary::after { content: '+'; color: var(--accent); font-size: 20px; line-height: 1; }
    .older-releases[open] summary::after { content: '-'; }
    .older-releases summary span { color: var(--soft); font-size: 12px; }
    @media (max-width: 620px) {
      body { padding: 36px 18px 64px; }
      .rel { grid-template-columns: 1fr; gap: 8px; padding: 26px 0; }
      .ver { flex-direction: row; align-items: center; }
      header h1 { font-size: clamp(40px, 14vw, 58px); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>

        '<b>Search Hint</b> — The new-tab input shows Enter vs. Shift-Enter hints so explicit web searches are easier to discover.',
        '<b>Quieter Recovery</b> — Transient WebKit frame interruptions and fast quit-after-launch cleanup no longer surface scary error screens.' ] },
      { v: '4.0.1', icon: 'shield-check', title: 'Sharper Browsing Controls', major: true, items: [
        '<b>Optional Extreme Ad Blocking</b> — Normal mode stays compatibility-first, and Extreme mode can push harder on ad-heavy sites.',
        '<b>Per-Site Escape Hatch</b> — When Extreme mode is on, a small shield appears in the URL bar so you can turn it off for the current site if something breaks.',
        '<b>Shift-Enter Searches</b> — Press Shift-Enter in the address or new-tab field to send the text straight to Google.',
        '<b>More Room for Tab Titles</b> — Sidebar tab names keep the close button out of the way until hover, so titles ellipsize later.',
        '<b>Cleaner New Tab Divider</b> — The plus divider is drawn as a single connected control instead of text dashes.' ] },
      { v: '4.0.0', icon: 'search-check', title: 'Nav Research Summaries', major: true, items: [
        '<b>Research Summary Pages</b> — Research-style Nav tasks now finish on a polished Breeze summary page instead of leaving you on a stray final search tab.',
        '<b>Sources Included</b> — Summary pages collect the useful links Nav found into a clean sources grid.',
        '<b>Smarter Form Filling</b> — Nav can type into more modern fields, including React-style inputs, ARIA text boxes, and rich text editors.',
        '<b>Better Agent Clicks</b> — Agent clicks now send fuller mouse events so custom web-app buttons respond more reliably.',
        '<b>Bigger Chat Text</b> — User and Nav chat bubbles use larger text for easier reading.' ] },
      { v: '3.8.6', icon: 'panel-left', title: 'Sidebar & Nav Polish', major: true, items: [
        '<b>Wider Default Sidebar</b> — The default sidebar now gives pinned apps room for four columns, while the skinny three-column layout remains available by resizing.',
        '<b>Later Tab Truncation</b> — Tab titles get more room before ellipsizing in the default layout.',
        '<b>Cleaner Nav Context Chips</b> — Context and response chips are compact, horizontally scrollable, and use native symbols instead of emoji.',
        '<b>Better Accent Match</b> — User chat bubbles use the selected tint directly for a closer match.',
        '<b>Refresh Spins In Place</b> — The reload symbol now rotates around the glyph center instead of orbiting around the button.' ] },
      { v: '3.8.4', icon: 'sparkles', title: 'New Breeze & Nav Icons', major: true, items: [
        '<b>New Breeze Mark</b> — Breeze now uses the refreshed dimensional B-heart icon throughout the app.',
        '<b>New Nav Mark</b> — Nav gets its own cleaner navigator icon, while new tab pages keep the Breeze mark.',
        '<b>Teal by Default</b> — Fresh profiles and white/blank legacy accent values now resolve to Breeze teal by default.',
        '<b>Assistant Contrast Fixes</b> — Empty-state quick prompts stay white with dark text in dark mode, and selecting AI message text no longer strips the bubble formatting.',
        '<b>Smarter Groups</b> — Group headers now support rename, disband, and delete, and Command-clicking same-site links opens them in a group automatically.',
        '<b>Page Zoom Shortcuts</b> — Command-Plus, Command-Minus, and Command-0 now zoom pages like a proper power-user browser.',
        '<b>Modern Site Compatibility</b> — Breeze now presents a newer Safari-compatible identity and shows a polished recovery page for real navigation failures.',
        '<b>Refresh Feels Alive</b> — The refresh icon now spins when you reload from the toolbar or page menu.' ] },
      { v: '3.8.3', icon: 'key-round', title: 'Site Permissions & Polished Window Controls', major: true, items: [
        '<b>Traffic Lights Aligned</b> — The macOS window controls now sit visually even with Breeze&rsquo;s sidebar button in the top bar.',
        '<b>Microphone &amp; Camera Work</b> — Breeze now includes the native macOS privacy strings and WebKit media-capture permission handling needed for sites that use navigator.mediaDevices.getUserMedia.',
        '<b>Per-Site Permission Choices</b> — Camera, microphone, and location requests can be allowed once, always allowed, or blocked, with saved choices managed from Settings → Site Permissions.',
        '<b>Settings Actually Controls Permissions</b> — The Site Permissions page now writes through to Breeze native settings instead of being display-only.',
        '<b>Cache Clearing Is Safer</b> — Clear selected data now honors the checkboxes, so clearing cache no longer silently wipes cookies and signs you out unless Cookies &amp; site data is selected.' ] },
      { v: '3.8.1', icon: 'search-check', title: 'Cleaner Find & Better Page Menus', major: true, items: [
        '<b>Find Stays Visible</b> — Command-F now opens as a raised overlay with a stronger background, border, and shadow so it does not disappear over bright pages.',
        '<b>Richer Right-Click Menus</b> — Page menus now include link actions, image actions, selected-text search, Ask Nav about selection, editable-field actions, bookmark, share, find, print, and normal navigation.',
        '<b>Private Tabs Included</b> — The richer page menu is wired into private tabs too.',
        '<b>Update Persistence Clarified</b> — Breeze still uses WebKit&rsquo;s persistent default website data store, so normal app updates do not clear cookies, cache, or logins.' ] },
      { v: '3.8.0', icon: 'bot', title: 'Meet Nav, Breeze Cloud & Images', major: true, items: [
        '<b>Nav Replaces Breeze AI</b> — The assistant is now Nav, with a dedicated compass-style corner icon while new chat pages keep the Breeze mark.',
        '<b>Breeze Cloud Included</b> — Nav now works out of the box through Breeze Cloud. No account setup, no service credential stored in the app, and daily fair-use limits keep the shared service reliable.',
        '<b>Image Generation &amp; Edits</b> — Use the paintbrush button to make images with Breeze Cloud image services at low quality, or attach images and ask Nav to edit them with page/tab context.',
        '<b>Images in History</b> — Generated images now appear under History → Images, and every image bubble has a download button.',
        '<b>Softer Image Loading</b> — The image placeholder is now a quieter blurred glow instead of a full-volume rainbow square.' ] },
      { v: '3.7.6', icon: 'search-check', title: 'Find, Pin Menus & Teal Chrome', major: true, items: [
        '<b>Find in Page</b> — Command-F opens a native find bar, with Command-G and Shift-Command-G for next and previous matches.',
        '<b>Full Menus for Pinned Apps</b> — Right-click an open pinned app to get the same tab actions as regular tabs, including Split View, Performance Mode, popups, duplicate, and close.',
        '<b>Teal by Default</b> — Breeze now defaults to a teal accent that tints the rail, sidebar, bezel, controls, and Breeze logos throughout the app.',
        '<b>Mono Still Exists</b> — The black/white theme accent is back as its own Settings swatch.' ] },
      { v: '3.7.5', icon: 'zap', title: 'Safer Cache Clear & Tab Robustness', major: true, items: [
        '<b>Current-Site Cache Clear</b> — The toolbar trash button now clears cache only for the site you are viewing instead of nuking cookies and signing you out everywhere. Tiny button, no longer a tiny apocalypse.',
        '<b>More Reliable New-Tab Submits</b> — Pressing Return in the new-chat/new-tab bar now submits decisively, so typed URLs and prompts do not get stranded in a blank tab state.',
        '<b>Pinned Tabs Recover Better</b> — If a pinned tab ever focuses into a blank WebKit shell, Breeze kicks the saved pin URL again instead of leaving you staring at browser drywall.',
        '<b>Less Brittle YouTube Handling</b> — Removed Breeze’s custom YouTube adblock layer and stale hardcoded Safari user agent so WebKit can use the current system identity.' ] },
      { v: '3.7.4', icon: 'bot', title: 'A More Human Breeze', major: true, items: [
        '<b>More Human Assistant Voice</b> — Breeze AI now defaults to a sharper, warmer, more conversational style: useful first, dry and witty when it fits, absolutely less “support bot in beige pants.”',
        '<b>New Chat Input Grows</b> — The center Ask bar now expands up to four wrapped lines before scrolling, so longer prompts stay readable instead of clipping awkwardly.',
        '<b>Still Your Preferences</b> — Your personal AI instructions still apply on top of Breeze’s default personality, so you can tune the vibe without fighting the app.' ] },
      { v: '3.7.3', icon: 'key-round', title: 'No Prompts, Just Breeze', major: true, items: [
        '<b>No More Service Key Prompts</b> — Assistant credentials now stay out of normal app settings, so using Nav never triggers a macOS password, Touch ID, or Keychain authorization interruption.',
        '<b>Rounder Everywhere</b> — Inputs, URL bars, buttons, sidebar tabs, settings controls, assistant controls, and suggestion hovers now share a softer pill-shaped design.',
        '<b>Suggestions Land in the Right Place</b> — New-tab suggestions open beneath the Ask bar, URL suggestions stay attached to the toolbar, and each menu shrinks to exactly the number of results it contains.',
        '<b>Still Secure on This Mac</b> — Local app secrets are readable only by your macOS user account and are used only when you ask Nav to help.' ] },
      { v: '3.7.2', icon: 'zap', title: 'Reliable Downloads, Tabs & Windows', major: true, items: [
        '<b>Downloads Finish Reliably</b> — Breeze now keeps every download alive from the moment a site starts it until the file finishes, fixing silent failures on JavaScript-heavy sites and right-click downloads.',
        '<b>Links Open Where You Asked</b> — Command-click and “Open Link in New Tab” open tabs, while “Open Link in New Window” now creates a real window.',
        '<b>New Windows Are Ready Immediately</b> — File → New Window now opens with a complete new-tab page, including your pins and search, instead of going blank or crashing.',
        '<b>Chat Reminders No Longer Crash</b> — Reminders scheduled by Breeze AI now appear safely in the sidebar and persist across relaunches while the macOS notification remains scheduled.' ] },
      { v: '3.7.1', icon: 'zap', title: 'Usage Estimates & Readable Chat', major: true, items: [
        '<b>Estimated AI Usage &amp; Cost</b> — Settings → Breeze AI now shows the tokens you\'ve used and an estimated cost for transparency. Reset the counter anytime.',
        '<b>Readable AI Replies in Light Mode</b> — Assistant responses now sit in a clean dark bubble with white text, so they\'re easy to read in light mode (and dark).',
        '<b>Clearer Key Button</b> — Fixed the "Manage key" button being hard to see on light accents in dark mode.' ] },
      { v: '3.7.0', icon: 'bot', title: 'Breeze AI, Now Powered by Breeze Cloud', major: true, items: [
        '<b>Bring Your Own Key</b> — Breeze AI can run through a user-supplied service credential. Add it in Settings → Breeze AI when that mode is available.',
        '<b>No More Local Model</b> — The on-device the local AI engine engine and its multi-gigabyte download are gone. Breeze installs smaller and the assistant is far smarter and faster.',
        '<b>Fully Agentic Browsing</b> — Ask Breeze to open sites, search the web, read the current page, click, type, and set reminders — it drives the browser for you to finish the task.',
        '<b>Friendly Key Prompts</b> — Use an AI feature without a key and Breeze points you to Settings to add one. No key, no surprise charges.',
        '<b>Your Key Stays Yours</b> — Stored in the macOS Keychain and used only for assistant requests. Breeze never asks for your keychain password just to open Settings.' ] },
      { v: '3.6.1', icon: 'bot', title: 'the local AI engine-Only Local AI Selection', major: true, items: [
        '<b>Stopped Reusing Old the local AI engine Files</b> — Breeze now only reuses the local AI engine model files from Application Support, so an old the local AI engine gguf can no longer get picked up by accident.',
        '<b>Consistent the local AI engine Copy</b> — The assistant and settings now consistently refer to the local the local AI engine model, which matches what Breeze actually runs.' ] },
      { v: '3.6.0', icon: 'zap', title: 'Faster Local AI & Redownload Model', major: true, items: [
        '<b>Snappier AI Assistant</b> — Tuned the on-device agent for the local AI engine so it processes far less text per step and replies noticeably faster.',
        '<b>Smarter Agent (No More Spinning)</b> — Breeze AI now detects when it’s stuck repeating itself and answers from what it has instead of looping, so multi-step tasks finish quicker.',
        '<b>Redownload Model Button</b> — Added a Redownload option in Settings → Breeze AI to wipe and reinstall the local the local AI engine model with one click if it ever gets corrupted.' ] },
      { v: '3.5.9', icon: 'zap', title: 'the local AI engine, Reminder Crash & Link Handoff Fixes', major: true, items: [
        '<b>Local the local AI engine Upgrade</b> — Upgraded the default local AI engine to the local AI engine for faster, smarter, and fully private local assistance.',
        '<b>Fixed Reminders Crash</b> — Prevented launch crashes caused by past/near-instant reminder schedules by enforcing safe delay boundaries.',
        '<b>Seamless External Link Handling</b> — Links opened from external apps like iMessage, Slack, or Mail now correctly and instantly route into your Breeze browser windows.' ] },
      { v: '3.5.8', icon: 'zap', title: 'AI Sidebar Bleeding Fix & New Tab Suggestions', major: true, items: [
        '<b>Fixed AI Sidebar UI Bleeding</b> — Fixed a bug where switching away from a fullscreen Breeze Chat tab caused the assistant panel UI to temporarily slide/bleed and display incorrectly on the bottom right corner of the next tab.',
        '<b>Autocomplete on New Tab</b> — Enabled the autocomplete suggestions dropdown popover on the center search and question input field of the New Tab page.' ] },
      { v: '3.5.7', icon: 'zap', title: 'Address Input & Autocomplete Hiding Fixes', major: true, items: [
        '<b>Fixed Address Bar Keyboard Focus</b> — Fixed a bug where Cocoa focus-shifting blocked typing in the address bar on new chat and web pages.',
        '<b>Instant Suggestions Hide</b> — Autocomplete suggestions dropdown popover now hides immediately as soon as you hit return or click away from the address bar.',
        '<b>Seamless Navigation Focus</b> — Pressing enter in the address bar now deactivates it and correctly focuses the page\'s webview (or internal settings page), allowing you to immediately start scrolling or typing on the site.' ] },
      { v: '3.5.6', icon: 'zap', title: 'Autocomplete Dropdown & Address Bar Focus Fixes', major: false, items: [
        '<b>Autocomplete Suggestions</b> — Added instant dropdown popover hiding on return or click away.',
        '<b>Navigation Focus</b> — Address bar deactivation and page webview focusing on navigation.' ] },
      { v: '3.5.5', icon: 'bot', title: 'Agent Actually Agents + Chat-Tab Fix', major: true, items: [
        '<b>The Agent Browses Again</b> — Asking Breeze to "go to facebook" or "remind me in 10 minutes…" now reliably opens the site and sets the reminder instead of replying "I can\'t access websites." The local model\'s hidden overthinking (fixed in 3.5.4) was causing it to bail before taking the action — verified directly against the model.',
        '<b>Reminders Set From Chat</b> — "Remind me in 10 minutes to call mom" now consistently creates the reminder. (If nothing fires, allow notifications for Breeze in System Settings → Notifications.)',
        '<b>Chat Tab No Longer Clips</b> — Leaving a fullscreen chat tab to click another tab no longer leaves the assistant as a clipped strip on the right edge. The chat stays in its own tab; the panel only opens when you ask for it.' ] },
      { v: '3.5.4', icon: 'zap', title: 'The Real Speed Fix — Local AI No Longer Overthinks', major: true, items: [
        '<b>the local AI engine Stops Overthinking Every Reply</b> — The local the local AI engine model is a "reasoning" model that secretly wrote a long internal monologue before <i>every</i> answer — even "hey" generated ~113 tokens, ~90 of them hidden thinking, which is why replies took ~10 seconds. Breeze now runs it in fast direct-answer mode, cutting that to ~16 tokens. Chat and agentic steps are dramatically faster.',
        '<b>Snappier Throughout</b> — Combined with capped generation length and prompt caching, every message and every browser action the AI takes now returns much sooner.' ] },
      { v: '3.5.3', icon: 'zap', title: 'Instant AI Replies (No More 10-Second "Hi")', major: true, items: [
        '<b>Way Faster AI With a Page Open</b> — Every message used to deep-scan the entire page (every button, link, and element) before the AI could respond, so even saying "hi" took ~10 seconds on a heavy page like YouTube. Breeze now grabs just the page title and text for context, and only does the full scan when the AI actually needs to click or type. Quick replies are quick again.' ] },
      { v: '3.5.2', icon: 'bot', title: 'Breeze AI Reads the Page You\'re On', major: true, items: [
        '<b>"What is this about?" Just Works</b> — Ask Breeze AI about the page, video, or article you\'re viewing and it answers from that page instead of asking which one you mean. The page you\'re actively looking at is now handed to the model as <i>the</i> current page, separate from your other tabs and history.',
        '<b>No More Blank Answers on Apple Intelligence</b> — On the small on-device model, a long page could overflow the context window and make the AI reply with nothing useful. We now trim page text to fit and seed the answer with the current page, so it stays on-topic.' ] },
      { v: '3.5.1', icon: 'zap', title: 'Fullscreen Video Fix, Real Downloads & Snappy Local AI', major: true, items: [
        '<b>Fullscreen Video No Longer Goes Black</b> — Fullscreen on YouTube, Netflix, and other players now plays correctly. The rounded web-area corners were clipping the hardware video overlay to black in fullscreen; we now flatten them while a video is fullscreen and restore them on exit.',
        '<b>Downloads That Actually Save</b> — "Download" buttons now save files. We now honor the standard download links (including blob: and data: URLs), so generated files (like mockups from shots.so), images, PDFs, and archives land in your Downloads folder instead of silently doing nothing.',
        '<b>Native File & Media Picker</b> — Implemented the WebKit open panel delegate so that file upload buttons and media attach menus on websites work correctly.',
        '<b>Fast & Stable Local AI</b> — Fixed a critical context size bug by disabling the buggy llama-server Jinja template wrapper. Prompt evaluation is now snappy and reliable.',
        '<b>Smarter Context Window</b> — Expanded the context size to 8192 tokens and increased the page text limit, allowing the local model to read long transcript pages and detailed articles without losing context.' ] },
      { v: '3.5.0', icon: 'zap', title: 'the local AI engine Priority, Live Progress & Link Fixes', major: true, items: [
        '<b>Local Download Progress Bar</b> — Added a visual progress bar inside Settings showing the local the local AI engine model download percentage.',
        '<b>Dark Mode Button Fix</b> — Restyled the the local AI engine download button to make sure it is fully visible and high-contrasted in Dark mode.',
        '<b>the local AI engine Priority Engine</b> — Swapped the default Local AI engine to the local AI engine as the primary model and added direct download actions to Settings.',
        '<b>Purged Service Credential Settings</b> — Removed older key setup inputs, selectors, and background keychain queries, eliminating the macOS system password prompts in Settings.',
        '<b>Custom URI Redirect Handoff</b> — Intercepts and opens external URI schemes (like twitter://, mailto:, slack://) natively, preventing page hangs and redirect loops.',
        '<b>Robust URL Launches</b> — Solved the blank tab issue when opening local file paths or unescaped query links from Finder or other applications.' ] },
      { v: '3.4.7', icon: 'cpu', title: 'the local AI engine Engine, Contextual History & Sidebar Reminders', major: true, items: [
        '<b>Upgraded to the local AI engine</b> — Swapped the primary AI engine to the local AI engine for vastly superior reasoning, logic, and browser interaction.',
        '<b>Persistent Context & Chat History</b> — The agent now fully retains chat history and tab contexts across turns so it never loses track of your follow-up requests.',
        '<b>Native Sidebar Reminders</b> — Active reminders now display directly in the sidebar, letting you view and cancel them instantly.',
        '<b>Streamlined Sidebar Footer</b> — Removed the adblock badge and aligned footer icons (Downloads, Saved, History, Theme, Settings) horizontally to make room for reminders and media players.' ] },
      { v: '3.4.6', icon: 'bot', title: 'The AI Knows When to Stop', major: true, items: [
        '<b>No more flailing</b> — When Breeze AI isn’t sure what you want, it now asks (“not sure what you mean — want me to search that?”) or just runs a quick web search, instead of clicking around the page hoping something works. Every click and keystroke has to be a deliberate step toward what you actually asked.' ] },
      { v: '3.4.5', icon: 'bot', title: 'Fullscreen Fix, Smarter Ask Bar & Honest Ad-Blocking', major: true, items: [
        '<b>Fixed black screen on fullscreen video</b> — Going fullscreen on a video (YouTube and anywhere else) could show a black screen. The rounded-corner clipping behind it is fixed — video now fills the screen properly.',
        '<b>The Ask bar always asks Breeze</b> — Typing anything that isn’t a web address into the new-tab bar now opens a full-window chat and lets Breeze decide whether to answer or take action, instead of jumping straight to a web search. (Hold ⌘ when you press Return to force a plain search.)',
        '<b>Now-playing that sticks around</b> — The sidebar mini-player no longer disappears when you pause — it stays put (with a dismiss ✕) until you close it or another track takes over. Works with any site that has audio or video: Spotify, SoundCloud, YouTube, and more.',
        '<b>Better ad-blocking, and the honest truth about it</b> — Added more rules to block ad trackers and banner/feed ads (YouTube included). But some sites — YouTube especially — now stream video ads from the same place as the video, and Apple’s WebKit doesn’t allow the deep script-level blocking browser extensions use. Settings now explains why; Breeze keeps blocking everything it can.' ] },
      { v: '3.4.4', icon: 'bot', title: 'Picture-in-Picture, Instant Chat & a Polished Sidebar', major: true, items: [
        '<b>Picture-in-Picture works again</b> — Video now pops out into a floating window. And it’s automatic: switch tabs or open a new one while you’re watching and the video follows you in PiP so it never stops. Toggle it off anytime in Settings.',
        '<b>New Chat shortcut (⌘⇧T)</b> — Instantly open a fresh, blank full-window chat and start typing. Unlike the new-tab Ask bar, it goes straight to an independent chat — no guessing between search, navigation, and AI. (New Private Tab moved to ⌥⌘T.)',
        '<b>Ask bar opens a full chat</b> — Typing a question into the new-tab Ask bar now opens a full-window chat instead of the side panel.',
        '<b>Redesigned now-playing</b> — The sidebar player is now a proper little media module — album art, title, and transport controls — instead of a tile that looked like a tab.',
        '<b>Cleaner address bar</b> — The page path is dimmed so the domain stands out at a glance.',
        '<b>Fixed new-tab input crash</b> — Submitting a query from the new-tab page (e.g. a quick “hey”) could crash the app. Resolved the underlying first-responder reentrancy so any input is safe.' ] },
      { v: '3.4.0', icon: 'zap', title: 'Startup Window Animation & External Link Handler', major: true, items: [
        '<b>Slide-up Startup Animation</b> — Added a gorgeous window transition on app startup that fades and slides up smoothly.',
        '<b>External Link Redirection</b> — Handled links clicked from third-party applications (like Discord/Slack) correctly to focus Breeze and load the clicked URL.',
        '<b>Keychain Crash Fix</b> — Solved the crash when opening Settings / vault items.' ] },
      { v: '3.3.0', icon: 'columns', title: 'Multi-Window Syncing & Ephemeral Private Browsing', major: true, items: [
        '<b>Multi-Window Real-Time Sync</b> — Open separate windows (⌘N) that share the same pins, groups, and tabs. If you view a tab in window B, it is instantly pulled into that window and leaves a placeholder with a "Pull Tab Here" button in window A.',
        '<b>Ephemeral Private Browsing</b> — Open private windows (⌘⇧N) or private tabs (⌘⇧T) utilizing ephemeral, non-persistent website data stores. Private tabs discard cookies, history, and storage on close, and are marked with a 🕵️ badge.',
        '<b>Removed OAuth Popup Windows</b> — Replaced separate login windows with a simpler, cleaner inline tab redirection loop.',
        '<b>Fluid Window Resizing</b> — Resizing windows is now completely seamless, matching the window background color directly to the active theme to avoid rendering glitches.',
        '<b>Fixed Settings Accent Color Crash</b> — Solved a crash that occurred when opening Settings by safely parsing the device RGB color space.' ] },
      { v: '3.2.0', icon: 'key-round', title: 'Keychain Storage, Custom Models, Vertical Rail, & Popup Fixes', major: true, items: [
        '<b>Secure Keychain Storage</b> — Assistant credentials are now securely stored in the macOS Keychain instead of the settings JSON. Existing keys are migrated automatically on launch.',
        '<b>Custom Service Options</b> — Choose from supported service routes, or type in any compatible route.',
        '<b>Vertical Sidebar Button Rail</b> — Footer navigation buttons are stacked vertically to free horizontal space so the now-playing player is never truncated.',
        '<b>Real Popup Windows for OAuth</b> — window.open popups (Google/GitHub/Lovable sign-in) open in a real native window sharing session state, resolving loops and login failures.',
        '<b>Legible Light Mode Chat</b> — Synced the materials and text rendering so AI replies and selection highlights are clear and high-contrast in light mode.' ] },
      { v: '3.1.2', icon: 'plug', title: 'Use your own assistant key, working sign-in popups', items: [
        '<b>Bring your own assistant key</b> — in Settings → AI you can use a personal service credential for stronger multi-step tasks like filling out forms. Your key is stored only on your Mac and calls the selected service directly.',
        '<b>Sign-in popups work now</b> — “Continue with Google / Apple / GitHub” pop-up windows no longer get blocked, so OAuth logins actually complete.',
        '<b>Cleaner fullscreen</b> — the gap reserved for the traffic-light buttons is reclaimed in fullscreen, where they only appear when you hover.' ] },
      { v: '3.1.1', icon: 'wrench', title: 'Agent fixes — cleaner, smarter, finishes the job', items: [
        '<b>No more numbers all over the page</b> — the AI now tags page elements invisibly, so the green numbered badges no longer clutter your view or linger after it finishes.',
        '<b>The AI follows through</b> — when you ask it to open or go to a result, it actually clicks through and completes the task instead of just describing what it found.',
        '<b>Chat docks open automatically</b> — when the AI opens a page or runs a search, the assistant slides open beside it so you see the answer right away.',
        '<b>Smarter Ask bar</b> — a plain search term goes straight to Google like a normal address bar, while questions get answered directly and only real tasks spin up the agent.' ] },
      { v: '3.1.0', icon: 'bot', title: 'Intelligent Browser Use — the AI can actually use websites now', major: true, items: [
        '<b>Vimium-style interactive element tagging</b> — every clickable button, link, and input on the page gets a visible numbered badge. The AI sees and targets these IDs with pinpoint accuracy instead of guessing at text labels.',
        '<b>The AI actually completes tasks now</b> — ask "pizza near me" and it will search, read results, pick a top option, and tell you about it in the chat. No more "I opened it for you" cop-outs.',
        '<b>Multi-step page interaction</b> — CLICK and TYPE actions now return the full updated page state after each step, so the AI can chain form fills, button clicks, and navigation seamlessly.',
        '<b>Auto-dock sidebar on agent tasks</b> — when the AI navigates from a chat tab to a webpage, the assistant sidebar automatically slides open so you never lose the conversation.',
        '<b>Smarter navigation</b> — the AI no longer invents broken map URLs or guesses at page-internal links. It opens Google, uses the search field, and reads real results like a human would.',
        '<b>Agent completion snapshots</b> — when the AI finishes a task, it captures a screenshot of the final browser state for your records.' ] },
      { v: '3.0.9', icon: 'zap', title: 'UI alignment, screen-wide Siri glow, and fullscreen chat tab', items: [
        '<b>Unified top bar layout</b> — navigation controls, the URL bar, and the AI corner button are now perfectly center-aligned and remain completely static when toggling the sidebar.',

    const log = document.getElementById('log');
    const [latest, ...past] = RELEASES;

    // The newest release gets a big, celebratory hero card with its icon.
    const hero = document.createElement('div');
    hero.className = 'hero';
    hero.innerHTML =
      '<div class="hero-orb o1"></div><div class="hero-orb o2"></div>' +
      `<div class="hero-icon">${ic(latest.icon)}</div>` +
      `<span class="hero-pill">Just landed · v${latest.v}</span>` +
      `<h2 class="hero-title">${latest.title}</h2>` +
      `<ul class="hero-list">${latest.items.map((i) => `<li>${i}</li>`).join('')}</ul>`;
    log.appendChild(hero);

    const head = document.createElement('div');
    head.className = 'past-head';
    head.textContent = 'The road here';
    log.appendChild(head);

    function relElement(r) {
      const el = document.createElement('div');
      el.className = 'rel' + (r.major ? '' : ' minor');
      el.innerHTML =
        `<div class="ver"><span class="rel-icon">${ic(r.icon)}</span><b>v${r.v}</b>${r.major ? '<span class="tag">Major</span>' : ''}</div>` +
        `<div class="rel-copy"><h3>${r.title}</h3>` +
        `<ul>${r.items.map((i) => `<li>${i}</li>`).join('')}</ul></div>`;
      return el;
    }

    const visiblePast = past.slice(0, 5);
    const olderPast = past.slice(5);
    for (const r of visiblePast) {
      log.appendChild(relElement(r));
    }
    if (olderPast.length) {
      const older = document.createElement('details');
      older.className = 'older-releases';
      older.innerHTML = `<summary>Older releases <span>${olderPast.length} more</span></summary>`;
      for (const r of olderPast) {
        older.appendChild(relElement(r));
      }
      log.appendChild(older);
    }

    // Theme live updates
    if (window.breezeInternal) {
      breezeInternal.onTheme && breezeInternal.onTheme((t) => {
        const dark = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('dark', dark);
      });
    }
  </script>
