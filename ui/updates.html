<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>What's New — Breeze</title>
  <script>
    // Apply theme before first paint (no flash), like the new-tab page.
    try {
      var t = window.breezeInternal && breezeInternal.theme;
      var dark = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) document.documentElement.classList.add('dark');
    } catch (e) {}
  </script>
  <style>
    :root {
      --bg: #f2f0ed; --card: rgba(255,255,255,0.7); --text: #23232a;
      --soft: rgba(35,35,42,0.55); --accent: #5b7cfa; --line: rgba(0,0,0,0.08);
      --ease: cubic-bezier(0.22,1,0.36,1);
    }
    html.dark {
      --bg: #16161a; --card: rgba(255,255,255,0.05); --text: #ececf0;
      --soft: rgba(236,236,240,0.5); --line: rgba(255,255,255,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text); min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 56px 24px 80px; transition: background 0.3s var(--ease);
    }
    .wrap { max-width: 680px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 44px; animation: rise 0.5s var(--ease); }
    header img { width: 60px; height: 60px; border-radius: 15px;
      filter: drop-shadow(0 8px 26px color-mix(in srgb, var(--accent) 40%, transparent)); margin-bottom: 16px; }
    header h1 { font-size: 30px; font-weight: 750; letter-spacing: -0.8px; }
    header p { color: var(--soft); font-size: 15px; margin-top: 8px; }
    .now { display: inline-block; margin-top: 14px; font-size: 12.5px; font-weight: 600;
      color: var(--accent); background: color-mix(in srgb, var(--accent) 13%, transparent);
      padding: 5px 12px; border-radius: 99px; }
    .rel { position: relative; padding: 0 0 30px 26px; border-left: 2px solid var(--line); }
    .rel:last-child { border-left-color: transparent; padding-bottom: 0; }
    .rel::before { content: ''; position: absolute; left: -7px; top: 4px; width: 12px; height: 12px;
      border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px var(--bg); }
    .rel.minor::before { background: var(--soft); width: 9px; height: 9px; left: -5.5px; }
    .ver { display: flex; align-items: center; gap: 9px; margin-bottom: 4px; }
    .ver b { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .ver .tag { font-size: 11px; font-weight: 700; color: #fff; background: var(--accent);
      padding: 2px 8px; border-radius: 99px; }
    .rel h3 { font-size: 15.5px; font-weight: 650; margin-bottom: 10px; }
    ul { list-style: none; display: flex; flex-direction: column; gap: 7px; }
    li { font-size: 13.5px; line-height: 1.55; color: var(--soft); padding-left: 18px; position: relative; }
    li::before { content: '–'; position: absolute; left: 2px; color: var(--accent); }
    li b { color: var(--text); font-weight: 600; }
    @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    /* Hero card for the newest release */
    .hero {
      position: relative; overflow: hidden;
      border-radius: 22px; padding: 30px 30px 26px; margin-bottom: 44px;
      color: #fff;
      background: linear-gradient(120deg, #5b7cfa, #7c5bfa, #b65bfa, #5b9dfa, #5b7cfa);
      background-size: 300% 300%;
      box-shadow: 0 24px 60px -18px color-mix(in srgb, var(--accent) 70%, transparent);
      animation: hero-pop 0.6s var(--ease), hero-flow 14s ease-in-out infinite;
    }
    @keyframes hero-pop { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: none; } }
    /* gentle gradient drift + a one-time shine sweep — fun, but cheap (one element) */
    @keyframes hero-flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .hero::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(105deg, transparent 35%, rgba(255,255,255,0.35) 50%, transparent 65%);
      transform: translateX(-120%); animation: hero-shine 1.5s var(--ease) 0.4s 1 forwards;
    }
    @keyframes hero-shine { to { transform: translateX(120%); } }
    .hero-orb { position: absolute; border-radius: 50%; pointer-events: none; filter: blur(8px); z-index: 0; }
    .hero-orb.o1 { width: 220px; height: 220px; top: -90px; right: -60px; background: radial-gradient(circle, rgba(255,255,255,0.35), transparent 70%); animation: orb-drift-a 11s ease-in-out infinite alternate; }
    .hero-orb.o2 { width: 160px; height: 160px; bottom: -80px; left: -40px; background: radial-gradient(circle, rgba(255,255,255,0.22), transparent 70%); animation: orb-drift-b 13s ease-in-out infinite alternate; }
    @keyframes orb-drift-a { from { transform: translate(0,0); } to { transform: translate(-30px, 24px); } }
    @keyframes orb-drift-b { from { transform: translate(0,0); } to { transform: translate(26px, -20px); } }
    /* content sits above the orbs — scoped so the orbs stay absolutely placed */
    .hero-icon, .hero-pill, .hero-title, .hero-list { position: relative; z-index: 1; }
    .hero-icon {
      width: 62px; height: 62px; border-radius: 17px; margin-bottom: 18px;
      display: grid; place-items: center;
      background: rgba(255,255,255,0.2); backdrop-filter: blur(8px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.45);
      animation: icon-pop 0.7s var(--ease) 0.15s backwards, icon-bob 3.4s ease-in-out 1.1s infinite;
    }
    .hero-icon svg { width: 33px; height: 33px; stroke: #fff; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    @keyframes icon-pop { 0% { opacity: 0; transform: scale(0.4) rotate(-12deg); } 60% { transform: scale(1.12) rotate(5deg); } 100% { opacity: 1; transform: none; } }
    @keyframes icon-bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .hero-pill {
      display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: 0.2px;
      background: rgba(255,255,255,0.22); padding: 5px 12px; border-radius: 99px; margin-bottom: 14px;
      backdrop-filter: blur(6px);
    }
    .hero-title { font-size: 26px; font-weight: 760; letter-spacing: -0.6px; margin-bottom: 16px; }
    .hero-list { display: flex; flex-direction: column; gap: 10px; }
    .hero-list li { font-size: 14px; line-height: 1.55; color: rgba(255,255,255,0.92); padding-left: 18px; position: relative; }
    .hero-list li::before { content: '→'; position: absolute; left: 0; color: #fff; }
    .hero-list li b { color: #fff; font-weight: 700; }
    /* small icon chip on each past release */
    .rel-icon { display: inline-grid; place-items: center; width: 22px; height: 22px; border-radius: 7px;
      background: color-mix(in srgb, var(--accent) 14%, transparent); flex-shrink: 0; }
    .rel-icon svg { width: 13px; height: 13px; stroke: var(--accent); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .past-head { font-size: 13px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase;
      color: var(--soft); margin: 0 0 22px 2px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <img src="icon.png" alt="" draggable="false" />
      <h1>What's new in Breeze</h1>
      <p>Where we started, and how far we've come — all on-device, all private.</p>
      <div class="now" id="now">You're on the latest</div>
    </header>
    <div id="log"></div>
  </div>

  <script>
    // Lucide icons (inline so the page works fully offline & private).
    const ICONS = {
      'search-check': '<path d="m8 11 2 2 4-4"/><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
      'refresh-cw': '<path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>',
      'zap': '<path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>',
      'book-open': '<path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/>',
      'shapes': '<path d="M8.3 10a.7.7 0 0 1-.626-1.079L11.4 3a.7.7 0 0 1 1.198-.043L16.3 8.9a.7.7 0 0 1-.572 1.1Z"/><rect x="3" y="14" width="7" height="7" rx="1"/><circle cx="17.5" cy="17.5" r="3.5"/>',
      'check-check': '<path d="M18 6 7 17l-5-5"/><path d="m22 10-7.5 7.5L13 16"/>',
      'graduation-cap': '<path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/>',
      'newspaper': '<path d="M15 18h-5"/><path d="M18 14h-8"/><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M10 6h8v4h-8V6Z"/>',
      'cpu': '<rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/>',
      'bot': '<path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/>',
      'maximize': '<path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>',
      'share': '<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/>',
      'rocket': '<path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>',
      'history': '<path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/>',
      'bell': '<path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/>',
      'columns': '<rect width="18" height="18" x="3" y="3" rx="2"/><path d="M12 3v18"/>',
      'lightbulb': '<path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/>',
      'download': '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/>',
      'ban': '<circle cx="12" cy="12" r="10"/><path d="m4.9 4.9 14.2 14.2"/>',
      'unlock': '<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>',
    };
    const ic = (name) => `<svg viewBox="0 0 24 24">${ICONS[name] || ICONS.shapes}</svg>`;

    const RELEASES = [
      { v: '2.9.8', icon: 'unlock', title: 'Lighter touch on reloads', items: [
        'Removed the "this page reloaded too many times" guard — it was too uptight and got in the way of legit sites. Pages just load freely now.' ] },
      { v: '2.9.6', major: true, icon: 'shapes', title: 'A changelog with character', items: [
        'Every update now gets its <b>own unique icon and a bit of motion</b> — no more plain glowing tile (and no more stars).',
        'Fixed a layout slip that left the featured card mostly empty.' ] },
      { v: '2.9.4', major: true, icon: 'search-check', title: 'Reads the whole answer', items: [
        'When searching the web, the assistant now <b>waits for streaming results to finish</b> before reading them — so it stops grabbing half-loaded answers and getting them wrong.',
        'Smart about it: settles fast once a page stops moving, but gives slow, streaming search engines the time they need.' ] },
      { v: '2.9.3', major: true, icon: 'refresh-cw', title: 'Clean model switching', items: [
        'Changing your AI model now <b>restarts Breeze cleanly</b> to load it — and <b>reopens your tabs</b> automatically, so you don\'t lose your place.',
        'A quick confirm first, so it never restarts on you by surprise.' ] },
      { v: '2.9.2', major: true, icon: 'zap', title: 'Replies you can count on', items: [
        '<b>Warms up before you type</b> — the model loads right after download, so it\'s ready the moment you ask. No more spinning on "thinking."',
        '<b>Never fires into a cold model</b> — if it\'s still warming up, your message waits and sends automatically the instant it\'s ready.',
        '<b>The full 7B is the default for everyone</b> — the smaller model is now an opt-in for slower machines (with a clear "it\'s weaker at summaries" heads-up).',
        '<b>Fixed garbled summaries</b> — longer pages no longer overflow and splice errors into the answer.' ] },
      { v: '2.9.1', major: true, icon: 'book-open', title: 'Find the changelog anytime', items: [
        '<b>What\'s New in Settings</b> — jump to this page from <b>Settings → Help &amp; FAQ</b> whenever you like, not just after an update.',
        '<b>A bit of life</b> — the featured update up top now stands out at a glance.' ] },
      { v: '2.9.0', major: true, icon: 'check-check', title: 'Snappier, calmer, all-Qwen', items: [
        '<b>One brain family, two sizes</b> — both the fast and smart models are now Qwen2.5 (3B and 7B). Rock-solid at tools, no more stalls.',
        '<b>No more crash-report popup on quit</b> — ⌘Q, Finder → Quit, and updates now exit cleanly.',
        '<b>This changelog got fancy</b> — the latest release now gets the spotlight up top. 👋' ] },
      { v: '2.8.0', major: true, icon: 'newspaper', title: 'This very page', items: [
        'Updates now open to a <b>changelog page you can revisit</b> — not a popup that vanishes. Visit it anytime by typing <b>/updates</b> or via <b>Help → What\'s New</b>.',
        'Backfilled the full history so you can see where Breeze started and how far it\'s come.' ] },
      { v: '2.7.0', major: true, icon: 'cpu', title: 'Pick your AI brain', items: [
        'Breeze now matches the AI model to your device — a smart <b>Qwen2.5 7B</b> for powerful Macs, or a fast, light <b>Qwen2.5 3B</b> for everything else.',
        'A friendly picker recommends the best fit for your machine after each big update — your choice, always.',
        'Switch models anytime in <b>Settings → AI</b>.' ] },
      { v: '2.6.0', major: true, icon: 'graduation-cap', title: 'A smarter, more capable assistant', items: [
        'Upgraded the local model for sharper answers and better instruction-following.',
        '<b>"Go to that site"</b> — tell the assistant to open a page (e.g. "go to winthenight.org and summarize") and it actually opens and reads it.',
        'The model now downloads quietly at launch, so it\'s ready when you are.',
        'A soft, deep tone the moment the assistant starts replying.' ] },
      { v: '2.5.0', major: true, icon: 'maximize', title: 'Fullscreen AI chat', items: [
        'Ask from any new tab — hit ↵ to chat, ⌘↵ to search the web instead; a real link just goes there.',
        'The chat opens fullscreen and isolated (no page context), then <b>auto-docks</b> into the sidebar the moment it searches or you open a page.',
        'Expand or dock the assistant anytime with a button.' ] },
      { v: '2.4.0', major: true, icon: 'share', title: 'Sharing & a tidier URL bar', items: [
        'One-click <b>copy link</b> button, plus a <b>share</b> button (native macOS share sheet).',
        'Fixed the new-tab theme flicker on open.' ] },
      { v: '2.3.13', icon: 'rocket', title: 'Per-tab Performance Mode', items: [
        'Right-click any sidebar tab → <b>Performance Mode</b> for smoother cloud gaming and video on that tab (hardware video overlay + no background throttling).' ] },
      { v: '2.3.9', icon: 'history', title: 'Reopen your tabs', items: [
        'Breeze can restore the tabs you had open when you quit — ask each time, always, or never.' ] },
      { v: '2.3.0', major: true, icon: 'bot', title: 'On-device AI, reimagined', items: [
        'Switched to <b>Qwen2.5</b> with agentic web search — the assistant opens a real search, reads the results, and cites sources, all locally.',
        'Reminders, split-view URL bars, and a more reliable assistant.' ] },
      { v: '2.2.0', icon: 'bell', title: 'Updates, notifications & passwords', items: [
        'Manual "Check for Updates", website notifications with per-site control, password capture & autofill, and proper code signing.' ] },
      { v: '2.1.0', major: true, icon: 'columns', title: 'Split screen & a real dashboard', items: [
        'Split view with a draggable divider, drag-to-reorder tabs, collapsible tab groups, a tabbed Settings dashboard, and AI chat history.' ] },
      { v: '2.0.0', major: true, icon: 'lightbulb', title: 'Breeze grows a brain', items: [
        'The big one: a private, on-device AI assistant with personality, page-reading, and reminders — plus first-run onboarding, safe-quit, and storage auto-heal.' ] },
      { v: '1.5.0', icon: 'download', title: 'Imports & a publishable build', items: [
        'Import from Chrome, Arc, Dia, and Safari; hardened ad-blocking; the first shareable build of Breeze.' ] },
    ];

    const log = document.getElementById('log');
    const [latest, ...past] = RELEASES;

    // The newest release gets a big, celebratory hero card with its icon.
    const hero = document.createElement('div');
    hero.className = 'hero';
    hero.innerHTML =
      '<div class="hero-orb o1"></div><div class="hero-orb o2"></div>' +
      `<div class="hero-icon">${ic(latest.icon)}</div>` +
      `<span class="hero-pill">Just landed · v${latest.v}</span>` +
      `<h2 class="hero-title">${latest.title}</h2>` +
      `<ul class="hero-list">${latest.items.map((i) => `<li>${i}</li>`).join('')}</ul>`;
    log.appendChild(hero);

    const head = document.createElement('div');
    head.className = 'past-head';
    head.textContent = 'The road here';
    log.appendChild(head);

    for (const r of past) {
      const el = document.createElement('div');
      el.className = 'rel' + (r.major ? '' : ' minor');
      el.innerHTML =
        `<div class="ver"><span class="rel-icon">${ic(r.icon)}</span><b>v${r.v}</b>${r.major ? '<span class="tag">Major</span>' : ''}</div>` +
        `<h3>${r.title}</h3>` +
        `<ul>${r.items.map((i) => `<li>${i}</li>`).join('')}</ul>`;
      log.appendChild(el);
    }

    // Theme live updates
    if (window.breezeInternal) {
      breezeInternal.onTheme && breezeInternal.onTheme((t) => {
        const dark = t === 'dark' || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('dark', dark);
      });
    }
  </script>
</body>
</html>
