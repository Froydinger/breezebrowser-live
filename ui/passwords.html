<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Passwords</title>
  <style>
    :root {
      --text: #2a2a2e;
      --text-soft: rgba(42, 42, 46, 0.5);
      --surface: rgba(255, 255, 255, 0.65);
      --surface-hover: rgba(255, 255, 255, 0.9);
      --accent: #5b7cfa;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    html.dark {
      --text: #ececf0;
      --text-soft: rgba(236, 236, 240, 0.45);
      --surface: rgba(255, 255, 255, 0.06);
      --surface-hover: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #faf8f5 0%, #f1ede7 60%, #ece6dd 100%);
      color: var(--text);
      padding: 56px 24px;
      display: flex;
      justify-content: center;
      transition: background 0.4s var(--ease);
    }

    html.dark body {
      background: linear-gradient(160deg, #1c1c24 0%, #15151b 60%, #131318 100%);
    }

    main { width: min(680px, 100%); animation: rise 0.5s var(--ease); }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: none; }
    }

    h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
    .subtitle { color: var(--text-soft); font-size: 13.5px; margin-bottom: 28px; line-height: 1.6; }

    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; }

    #search {
      flex: 1;
      height: 42px;
      border: none;
      outline: none;
      border-radius: 12px;
      padding: 0 16px;
      font-size: 13.5px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
    }

    #search:focus { box-shadow: 0 0 0 2.5px color-mix(in srgb, var(--accent) 40%, transparent); }
    #search::placeholder { color: var(--text-soft); }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 0 16px;
      height: 42px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: filter 0.15s;
    }

    .btn:hover { filter: brightness(1.08); }
    .btn.ghost { background: var(--surface); color: var(--text); font-weight: 500; }

    .cred {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--surface);
      border-radius: 14px;
      padding: 13px 16px;
      margin-bottom: 8px;
      animation: rise 0.25s var(--ease);
    }

    .cred .site-ic {
      width: 34px; height: 34px;
      border-radius: 9px;
      background: color-mix(in srgb, var(--accent) 14%, transparent);
      color: var(--accent);
      display: grid; place-items: center;
      font-weight: 700; font-size: 14px;
      flex-shrink: 0;
    }

    .cred .info { flex: 1; min-width: 0; }
    .cred .site { font-size: 13.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cred .user { font-size: 12px; color: var(--text-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

    .cred .actions { display: flex; gap: 4px; flex-shrink: 0; }
    .cred .actions button {
      border: none; background: transparent;
      color: var(--text-soft);
      font-family: inherit; font-size: 12px;
      padding: 6px 9px; border-radius: 8px;
      cursor: pointer;
      transition: background 0.13s, color 0.13s;
    }
    .cred .actions button:hover { background: var(--surface-hover); color: var(--text); }
    .cred .actions .del:hover { color: #e5604c; }

    #add-form {
      display: none;
      background: var(--surface);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      gap: 10px;
      flex-direction: column;
    }

    #add-form.show { display: flex; }

    #add-form input {
      height: 40px;
      border: none;
      outline: none;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface-hover);
    }

    #add-form input:focus { box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 40%, transparent); }

    #empty { text-align: center; color: var(--text-soft); font-size: 14px; padding: 60px 0; line-height: 1.7; }
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--accent); color: #fff;
      padding: 10px 18px; border-radius: 12px;
      font-size: 13px; transition: transform 0.3s var(--ease);
    }
    #toast.show { transform: translateX(-50%); }
  </style>
</head>
<body>
  <main>
    <h1>Passwords</h1>
    <div class="subtitle">
      Encrypted on this device with your macOS keychain — never synced, never sent anywhere.<br/>
      Right-click any login field on a site to fill. Import via CSV exported from Chrome, Safari, or Firefox.
    </div>

    <div class="toolbar">
      <input id="search" type="text" placeholder="Search passwords…" />
      <button class="btn" id="show-add">Add</button>
      <button class="btn ghost" id="import-btn">Import CSV</button>
      <input type="file" id="import-file" accept=".csv,text/csv" style="display:none" />
    </div>

    <div id="add-form">
      <input id="f-site" type="text" placeholder="Site (e.g. github.com)" />
      <input id="f-user" type="text" placeholder="Username or email" />
      <input id="f-pass" type="password" placeholder="Password" />
      <button class="btn" id="save-add">Save</button>
    </div>

    <div id="list"></div>
    <div id="empty" style="display:none">No passwords saved.<br/>Add one or import a CSV from your old browser.</div>
  </main>
  <div id="toast"></div>

  <script>
    let all = [];
    const listEl = document.getElementById('list');
    const emptyEl = document.getElementById('empty');

    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    }

    function hostOf(site) {
      try { return (site.includes('://') ? new URL(site).hostname : site).replace(/^www\./, ''); }
      catch { return site; }
    }

    function render() {
      const q = document.getElementById('search').value.trim().toLowerCase();
      const items = q
        ? all.filter((c) => c.site.toLowerCase().includes(q) || c.username.toLowerCase().includes(q))
        : all;
      listEl.textContent = '';
      emptyEl.style.display = items.length ? 'none' : '';
      for (const c of items) {
        const el = document.createElement('div');
        el.className = 'cred';

        const ic = document.createElement('div');
        ic.className = 'site-ic';
        ic.textContent = (hostOf(c.site)[0] || '?').toUpperCase();

        const info = document.createElement('div');
        info.className = 'info';
        const site = document.createElement('div');
        site.className = 'site';
        site.textContent = hostOf(c.site);
        const user = document.createElement('div');
        user.className = 'user';
        user.textContent = c.username || '—';
        info.append(site, user);

        const actions = document.createElement('div');
        actions.className = 'actions';
        const copyU = document.createElement('button');
        copyU.textContent = 'Copy user';
        copyU.addEventListener('click', () => { navigator.clipboard.writeText(c.username); toast('Username copied'); });
        const copyP = document.createElement('button');
        copyP.textContent = 'Copy pass';
        copyP.addEventListener('click', () => { navigator.clipboard.writeText(c.password); toast('Password copied'); });
        const del = document.createElement('button');
        del.className = 'del';
        del.textContent = 'Delete';
        del.addEventListener('click', () => {
          if (confirm(`Delete password for ${hostOf(c.site)}?`)) breezeInternal.vaultDelete(c.id);
        });
        actions.append(copyU, copyP, del);

        el.append(ic, info, actions);
        listEl.appendChild(el);
      }
    }

    breezeInternal.getSettings().then((s) => {
      document.documentElement.classList.toggle('dark', s.theme === 'dark');
      if (s.accent) document.documentElement.style.setProperty('--accent', s.accent);
    });
    breezeInternal.onTheme((t) => document.documentElement.classList.toggle('dark', t === 'dark'));

    breezeInternal.vaultList().then((v) => { all = v; render(); });
    breezeInternal.onVault((v) => { all = v; render(); });
    breezeInternal.onVaultImported((n) => toast(`Imported ${n} password${n === 1 ? '' : 's'}`));

    document.getElementById('search').addEventListener('input', render);
    document.getElementById('show-add').addEventListener('click', () =>
      document.getElementById('add-form').classList.toggle('show'));
    document.getElementById('save-add').addEventListener('click', () => {
      const site = document.getElementById('f-site').value.trim();
      const user = document.getElementById('f-user').value.trim();
      const pass = document.getElementById('f-pass').value;
      if (!site || !pass) { toast('Site and password required'); return; }
      breezeInternal.vaultAdd(site, user, pass);
      ['f-site', 'f-user', 'f-pass'].forEach((id) => (document.getElementById(id).value = ''));
      document.getElementById('add-form').classList.remove('show');
      toast('Saved');
    });

    document.getElementById('import-btn').addEventListener('click', () =>
      document.getElementById('import-file').click());
    document.getElementById('import-file').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      breezeInternal.vaultImportCSV(await file.text());
      e.target.value = '';
    });
  </script>
</body>
</html>
