<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  :root {
    --surface: rgba(255, 255, 255, 0.98);
    --text: #2a2a2e;
    --text-soft: rgba(42, 42, 46, 0.55);
    --hover: rgba(0, 0, 0, 0.06);
    --accent: #5b7cfa;
    --shadow: 0 2px 8px rgba(0, 0, 0, 0.12), 0 10px 28px rgba(0, 0, 0, 0.16);
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }
  body.dark {
    --surface: #26262c;
    --text: #ececf0;
    --text-soft: rgba(236, 236, 240, 0.55);
    --hover: rgba(255, 255, 255, 0.1);
    --accent: #7b95ff;
    --shadow: 0 2px 8px rgba(0, 0, 0, 0.4), 0 10px 28px rgba(0, 0, 0, 0.5);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  /* normal flow from the top-left so getBoundingClientRect reports the true
     intrinsic size (an absolutely-positioned stack measures huge). main sizes
     the view to this and anchors it to the window's bottom-left.
     generous padding leaves room for each toast's drop shadow so it doesn't
     get clipped to a hard rectangle by the view bounds. */
  #stack {
    display: inline-flex;
    flex-direction: column;
    gap: 8px;
    padding: 26px;
    width: max-content;
    max-width: 360px;
  }
  .toast {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--surface);
    box-shadow: var(--shadow);
    border: 1px solid color-mix(in srgb, var(--accent) 26%, transparent);
    border-radius: 12px;
    padding: 8px 8px 8px 12px;
    font-size: 13px;
    color: var(--text);
    animation: rise 0.28s var(--ease);
  }
  @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .toast.leaving { opacity: 0; transform: translateY(8px); transition: opacity 0.25s var(--ease), transform 0.25s var(--ease); }
  .t-body { display: flex; align-items: center; gap: 9px; cursor: pointer; min-width: 0; }
  .t-body svg { width: 16px; height: 16px; color: var(--accent); flex-shrink: 0; }
  .t-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .t-restart {
    border: none; background: var(--accent); color: #fff; font-family: inherit;
    font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 8px; cursor: pointer;
    margin-left: 4px;
  }
  .t-close {
    flex-shrink: 0; width: 24px; height: 24px; display: grid; place-items: center;
    border: none; background: transparent; color: var(--text-soft); border-radius: 7px; cursor: pointer;
  }
  .t-close svg { width: 13px; height: 13px; }
  .t-close:hover { background: var(--hover); color: var(--text); }
</style>
</head>
<body>
  <div id="stack"></div>
  <script>
    const stack = document.getElementById('stack');
    const DL_SVG = '<svg viewBox="0 0 16 16"><path d="M8 2v8M4.5 6.5 8 10l3.5-3.5M3 13h10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    const UP_SVG = '<svg viewBox="0 0 16 16"><path d="M8 13V3M4.5 6.5 8 3l3.5 3.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    const REM_SVG = '<svg viewBox="0 0 16 16"><circle cx="8" cy="9" r="5.5" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M8 6.2V9l1.8 1.1M8 1.5v1.4M5.5 2.2 4 1M10.5 2.2 12 1" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>';
    const ICONS = { update: UP_SVG, reminder: REM_SVG, download: DL_SVG };
    const X_SVG = '<svg viewBox="0 0 16 16"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>';

    function reportSize() {
      const r = stack.getBoundingClientRect();
      const kids = stack.children.length;
      overlay.size(kids ? Math.ceil(r.width) : 0, kids ? Math.ceil(r.height) : 0);
    }
    const ro = new ResizeObserver(reportSize);
    ro.observe(stack);

    function removeToast(el) {
      el.classList.add('leaving');
      setTimeout(() => { el.remove(); reportSize(); }, 250);
    }

    // Soft two-note chime on every notification (synthesized — no asset).
    let audioCtx = null;
    function playChime() {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const now = audioCtx.currentTime;
        [[880, 0], [1175, 0.09]].forEach(([freq, t]) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0, now + t);
          gain.gain.linearRampToValueAtTime(0.12, now + t + 0.015);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + t + 0.22);
          osc.connect(gain).connect(audioCtx.destination);
          osc.start(now + t);
          osc.stop(now + t + 0.24);
        });
      } catch {}
    }

    function addToast({ id, kind, text, action, persist, ready, playSound }) {
      if (playSound !== false) playChime();
      // de-dupe by id (e.g. a download's started→done update reuses the row)
      if (id != null) {
        const ex = stack.querySelector(`[data-id="${id}"]`);
        if (ex) ex.remove();
      }
      const el = document.createElement('div');
      el.className = 'toast';
      if (id != null) el.dataset.id = id;

      const body = document.createElement('div');
      body.className = 't-body';
      body.innerHTML = (ICONS[kind] || DL_SVG) + `<span class="t-text"></span>`;
      body.querySelector('.t-text').textContent = text;
      if (action) body.addEventListener('click', () => { overlay.action(action); removeToast(el); });
      el.appendChild(body);

      // Only the DOWNLOADED update gets a Restart button — "found/downloading"
      // can't restart yet, so it just informs and auto-dismisses.
      if (kind === 'update' && ready) {
        const btn = document.createElement('button');
        btn.className = 't-restart';
        btn.textContent = 'Restart';
        btn.addEventListener('click', () => overlay.action('install-update'));
        el.appendChild(btn);
      }

      const close = document.createElement('button');
      close.className = 't-close';
      close.innerHTML = X_SVG;
      close.addEventListener('click', () => removeToast(el));
      el.appendChild(close);

      stack.appendChild(el);
      reportSize();

      if (!persist) setTimeout(() => { if (el.isConnected) removeToast(el); }, 10000);
    }

    overlay.onToast(addToast);
    overlay.onTheme((t) => document.body.classList.toggle('dark', t === 'dark'));
  </script>
</body>
</html>
