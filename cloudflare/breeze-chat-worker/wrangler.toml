name = "breeze-chat"
main = "src/index.ts"
compatibility_date = "2026-06-23"
workers_dev = true

[vars]
# Provider routing lives here (not just the dashboard) so `wrangler deploy` can
# never wipe it again. The API key stays a secret (OPENAI_API_KEY / AI_PROVIDER_API_KEY).
AI_CHAT_ENDPOINT = "https://api.openai.com/v1/chat/completions"
AI_CHAT_MODEL = "gpt-5.4-mini"
MAX_OUTPUT_TOKENS = "2400"
CHAT_DAILY_LIMIT = "1000"

[[durable_objects.bindings]]
name = "QUOTA"
class_name = "QuotaTracker"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["QuotaTracker"]
